---
# ============================================================================
# Nested vSphere Lab - single input file for all stages.
# Copy to input.yaml and edit. Secrets (passwords/passphrases) live in
# secrets.env (gitignored) -- see secrets.example.env. Never put secrets here.
# ============================================================================

jumpbox:
  private_nic: ens224          # MUST be a real physical NIC (validated by preflight)
  public_nic: ens192           # the only egress interface
  hostname: jump01
  domain: env1.lab.test
  min_disk_gb: 100             # preflight fails if '/' has less free than this (default 100)

network:
  private_supernet: 192.168.100.0/22   # all VLAN /24s must fall inside this /22
  native_vlan: 100                     # untagged VLAN
  vlans:
    - { id: 100, name: mgmt,      cidr: 192.168.100.0/24, dhcp: true }
    - { id: 101, name: workload0, cidr: 192.168.101.0/24, dhcp: true }
    - { id: 102, name: workload1, cidr: 192.168.102.0/24, dhcp: true }
    # .1 of each /24 becomes the gateway IP owned by the jumpbox.

mtu:
  private: 9000                # jumbo on private NIC + all VLAN sub-interfaces

ntp:
  upstream:
    - 10.0.0.10                # reachable from nested nodes via the jumpbox NAT

dns:
  use_local_resolver: true     # point the jumpbox's OWN resolver at BIND for lab names + reverse zones (needed for SSH -D SOCKS remote DNS and on-box lookups). false = leave the resolver untouched.
  forwarders:
    - 8.8.8.8
    - 1.1.1.1
  records:                     # pre-created A + PTR so Stage 2 names resolve
    - { name: vcsa,   ip: 192.168.100.50 }
    - { name: esxi01, ip: 192.168.100.51 }
    - { name: esxi02, ip: 192.168.100.52 }
    - { name: esxi03, ip: 192.168.100.53 }
    - { name: registry, ip: 192.168.100.10 }

dhcp:
  lease_time: 86400            # pool auto = last /26 of each VLAN /24 (.193-.254)
  reservations:
    - { vlan: 100, mac: "00:50:56:aa:bb:cc", ip: 192.168.100.51 }

proxy:                         # optional; leave blank if no upstream proxy
  http: ""
  https: ""
  no_proxy: "localhost,127.0.0.1,.env1.lab.test,192.168.100.0/22"

routing:
  nat: true
  static_routes:
    - { dest: 192.168.103.0/24, via: 192.168.101.2 }   # e.g. Supervisor LB VIP range
  bgp:
    enabled: false
    local_asn: 65010
    router_id: 192.168.100.1
    neighbors:
      - { ip: 10.0.0.1, asn: 65000 }

certs:
  ca_mode: selfsigned          # selfsigned | byo
  byo:
    cert: ""                   # path to PEM cert when ca_mode=byo
    key: ""                    # path to PEM key  when ca_mode=byo
  intermediate: false
  subject:
    org: CustomerLab
    cn: "Nested Lab Root CA"
    country: US
  dir: /etc/nested-lab/ca
  backup_path: /root/lab-ca-backup

registry:                      # plain OCI registry (CNCF Distribution / registry:2)
  name: registry               # FQDN = <name>.<jumpbox.domain> (match a dns.records entry). Set 'fqdn:' instead to override with a full name.
  ip: 192.168.100.10           # the registry is bound PRIVATE-ONLY on this IP (blank -> native VLAN gateway)
  data_dir: /data/registry
  auth: false                  # true -> htpasswd auth (admin / REGISTRY_ADMIN_PASSWORD)
  image_mirror: mirror.gcr.io/library  # pull setup images (registry:2, httpd:2, hello-world) via this Docker Hub mirror to avoid rate limits; blank = Docker Hub direct
  pull_through:                # optional pull-through cache mirror for nested nodes (single upstream)
    url: ""                    # e.g. https://registry-1.docker.io
    port: 5443

artifacts:
  dir: /data/isos              # local OVA/ISO folder (consumed by Stage 2)

# ============================================================================
# Stage 2 — nested vSphere (VCF/vSphere 9.1)
# Names and IPs for nested VMs are sourced from dns.records above.
# VLAN references use names defined in network.vlans above.
# Secrets (passwords) live in secrets.env — never here.
# ============================================================================
stage2:
  profile: vds_foundation_lb     # vds_foundation_lb | vds_avi | nsx_vpc | nsx_vlan

  underlying:
    type: esxi                   # esxi (standalone host) | vcenter (existing vCenter)
    host: 10.0.0.5               # ESXi IP/hostname, or the vCenter IP/hostname
    username: root               # root for esxi; administrator@vsphere.local for vcenter
    datastore: datastore1        # target datastore for nested VMs
    portgroup_trunk: mgmt-priv   # the VLAN-trunk portgroup that EXISTS ON YOUR HOST (std-switch PG on esxi; distributed PG on vcenter). VMs attach here.
    # Required only when type: vcenter — placement for the nested VMs + VCSA:
    datacenter: ""               # e.g. Datacenter
    cluster: ""                  # e.g. Cluster1

  esxi:
    ova: Nested_ESXi9.0_Appliance_Template.ova   # filename under artifacts.dir
    ova_network: ""              # OVF network label INSIDE the OVA — leave blank to auto-detect (recommended). This is NOT your host portgroup (that's underlying.portgroup_trunk).
    dns_prefix: esxi             # matches esxi01/02/03 in dns.records; derives count + IPs + FQDNs
    cpu: 8
    mem_gb: 48
    # disk[0] = boot. Data disks depend on cluster.vsan.mode below:
    #   OSA (default): exactly one 'vsan_cache' + one 'vsan_capacity' disk, of
    #                  DISTINCT sizes (matched by size at claim time).
    #   ESA:           one or more 'vsan_data' disks (all pooled; no cache).
    disks:
      - { size_gb: 32,  label: boot }
      - { size_gb: 24,  label: vsan_cache }      # OSA cache tier
      - { size_gb: 400, label: vsan_capacity }   # OSA / ESA data tier
    # For ESA instead, use e.g.:
    #   - { size_gb: 32,  label: boot }
    #   - { size_gb: 400, label: vsan_data }
    #   - { size_gb: 400, label: vsan_data }

  vcsa:
    iso: VMware-VCSA-all-9.0.0.0.iso   # VCSA installer ISO under artifacts.dir
    iso_mount: /mnt/vcsa-iso           # where the ISO is mounted for vcsa-deploy
    dns_name: vcsa               # looked up in dns.records; derives IP + FQDN
    sso_domain: vsphere.local
    size: tiny                   # tiny | small | medium | large

  cluster:
    name: nested-cluster
    datacenter: nested-dc
    vds_name: nested-vds
    vds_version: 9.0.0           # VDS product version
    uplink_pnic: vmnic1          # nested ESXi pNIC used as the VDS uplink (vmnic0 stays mgmt)
    vsan:
      mode: osa                  # osa (default; lighter, recommended for nested) | esa (memory-intensive)
      ftt: 1                     # FTT=1 RAID-1 (minimum for 3 hosts)
      datastore_name: vsanDatastore

  supervisor:
    name: supervisor
    mgmt_network: mgmt           # DVPG for control-plane + FLB mgmt (network.vlans[].name)
    workload_network: workload0  # DVPG for FLB frontend + workload nodes (network.vlans[].name)
    control_plane_size: tiny     # tiny | small | medium | large
    control_plane_count: 1       # supervisor control-plane VMs (1 for a light lab; 3 for HA)
    service_cidr: 10.96.0.0/23   # internal k8s ClusterIP range
    content_library: tkg-content-library
    # Subscribed TKr (Tanzu Kubernetes releases) library. Leave content_library_url
    # blank to instead create an empty LOCAL library.
    content_library_url: https://wp-content.broadcom.com/v2/latest/lib.json
    content_library_on_demand: true   # sync on demand (metadata only until an image is needed)
    storage_policy: vsan-default
    # IP ranges (start + count). Must sit OUTSIDE the DHCP pool (.193-.254) and
    # avoid the ESXi/VCSA static IPs. The VIP range must be routed to the
    # workload network (see routing.static_routes above).
    ranges:
      control_plane: { start: 192.168.100.60,  count: 5 }    # CP node mgmt IPs (mgmt net)
      flb_management: { start: 192.168.100.70,  count: 3 }    # FLB mgmt-persona IPs (mgmt net)
      flb_frontend:   { start: 192.168.101.2,   count: 10 }   # FLB frontend IPs (workload net)
      workload_node:  { start: 192.168.101.100, count: 50 }   # workload node IPs (workload net)
      vip:            { start: 192.168.103.10,  count: 100 }  # LB VIPs (routed range)
