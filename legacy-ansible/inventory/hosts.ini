# Stage 1 targets the jumpbox itself.
#
# LOCAL MODE (run on the jumpbox): leave as-is. Uses connection=local, no SSH.
#
# REMOTE MODE (run from an operator workstation): comment the local line below and
# uncomment the remote block, pointing ansible_host at the jumpbox PUBLIC/MGMT IP.
# The networking role only touches the PRIVATE NIC, so the SSH session stays up.

[jumpbox]
localhost ansible_connection=local

# [jumpbox]
# jump01 ansible_host=10.0.0.20 ansible_user=ubuntu ansible_become=true
