---
# Non-secret defaults. User input.yaml (loaded via -e @input.yaml) overrides these.
# Secrets (passwords, passphrases) must come from an ansible-vault file, never here.

# ---- Minimums enforced by preflight ----
min_disk_gb: 100
supported_os_families:
  - Debian      # Ubuntu
  - RedHat      # RHEL/Rocky/Alma
  - VMware      # Photon

# ---- Jumpbox identity ----
jumpbox:
  private_nic: ens224
  public_nic: ens192
  hostname: jump01
  domain: env1.lab.test

# ---- Private network / VLANs ----
network:
  private_supernet: 192.168.100.0/22
  native_vlan: 100
  vlans:
    - { id: 100, name: mgmt,      cidr: 192.168.100.0/24, dhcp: true }
    - { id: 101, name: workload0, cidr: 192.168.101.0/24, dhcp: true }
    - { id: 102, name: workload1, cidr: 192.168.102.0/24, dhcp: true }

# Jumbo frames on the private fabric only; public NIC untouched.
mtu:
  private: 9000

# ---- Time (no local NTP server; upstream reached via NAT, advertised by DHCP) ----
ntp:
  upstream:
    - time.vmware.com

# ---- DNS ----
dns:
  forwarders:
    - 8.8.8.8
    - 1.1.1.1
  records: []        # [{ name: vcsa, ip: 192.168.100.50 }, ...]

# ---- DHCP (Kea); pool auto-derived as the last /26 of each VLAN /24 ----
dhcp:
  lease_time: 86400
  reservations: []   # [{ vlan: 100, mac: "...", ip: "..." }, ...]

# ---- Optional upstream HTTP proxy ----
proxy:
  http: ""
  https: ""
  no_proxy: "localhost,127.0.0.1"

# ---- Routing ----
routing:
  nat: true
  static_routes: []  # [{ dest: 192.168.104.0/24, via: 192.168.102.2 }, ...]
  bgp:
    enabled: false
    local_asn: 65010
    router_id: 192.168.100.1
    neighbors: []    # [{ ip: 10.0.0.1, asn: 65000 }, ...]

# ---- PKI / CA ----
certs:
  ca_mode: selfsigned   # selfsigned | byo
  byo:
    cert: ""
    key: ""
  intermediate: false
  subject:
    org: CustomerLab
    cn: "Nested Lab Root CA"
    country: US
  dir: /etc/nested-lab/ca
  backup_path: /root/lab-ca-backup
  # key_passphrase comes from vault var `vault_ca_key_passphrase`

# ---- Harbor OCI registry ----
registry:
  type: harbor
  version: "v2.11.1"
  fqdn: harbor.env1.lab.test
  ip: ""                # defaults to gateway IP of native VLAN if empty
  data_dir: /data/harbor
  # admin_password comes from vault var `vault_registry_admin_password`
  proxy_cache: []       # [{ name: dockerhub, url: "https://registry-1.docker.io" }, ...]

# ---- Local artifact (OVA/ISO) folder used by Stage 2 ----
artifacts:
  dir: /data/isos

# ---- Paths the roles write to ----
lab:
  state_dir: /etc/nested-lab
  info_file: /etc/nested-lab/lab-info.txt
