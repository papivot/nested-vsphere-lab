---
# ============================================================================
# Stage 1 verification / test suite. Read-only assertions against live state.
#   ./run.sh --input input.yaml --stage 1 --verify
# ============================================================================
- name: "Stage 1 :: Verify"
  hosts: jumpbox
  become: true
  gather_facts: true

  pre_tasks:
    - name: "Recompute derived facts (vlans_computed, harbor_ip, os_key)"
      ansible.builtin.set_fact:
        vlans_computed: >-
          {{ vlans_computed | default([]) + [ item | combine({
              'gateway':     item.cidr | ansible.utils.ipaddr('1') | ansible.utils.ipaddr('address'),
              'prefix':      item.cidr | ansible.utils.ipaddr('prefix'),
              'dhcp_start':  (item.cidr | ansible.utils.ipsubnet(26, 3)) | ansible.utils.ipaddr('1')  | ansible.utils.ipaddr('address'),
              'dhcp_end':    (item.cidr | ansible.utils.ipsubnet(26, 3)) | ansible.utils.ipaddr('-2') | ansible.utils.ipaddr('address'),
              'is_native':   (item.id == network.native_vlan),
              'iface':       jumpbox.private_nic if (item.id == network.native_vlan) else (jumpbox.private_nic ~ '.' ~ item.id)
            }) ] }}
      loop: "{{ network.vlans }}"
      loop_control:
        label: "vlan {{ item.id }}"

    - name: "Resolve facts"
      ansible.builtin.set_fact:
        harbor_ip: "{{ registry.ip if (registry.ip | default('') | length > 0) else (vlans_computed | selectattr('is_native') | map(attribute='gateway') | first) }}"
        os_key: "{{ 'Photon' if ('Photon' in ansible_facts.distribution) else ansible_facts.os_family }}"
        native_gw: "{{ vlans_computed | selectattr('is_native') | map(attribute='gateway') | first }}"

  tasks:
    # ---- MTU ----
    - name: "Read interface MTUs"
      ansible.builtin.command: "cat /sys/class/net/{{ item.iface }}/mtu"
      changed_when: false
      register: mtu_read
      loop: "{{ vlans_computed }}"
      loop_control:
        label: "{{ item.iface }}"

    - name: "TEST :: jumbo MTU on private + VLAN interfaces"
      ansible.builtin.assert:
        that: (item.stdout | int) == (mtu.private | int)
        fail_msg: "{{ item.item.iface }} MTU={{ item.stdout }} expected {{ mtu.private }}"
        success_msg: "{{ item.item.iface }} MTU={{ item.stdout }} OK"
      loop: "{{ mtu_read.results }}"
      loop_control:
        label: "{{ item.item.iface }}"

    # ---- gateway IPs ----
    - name: "Show addresses"
      ansible.builtin.command: "ip -4 addr show dev {{ item.iface }}"
      changed_when: false
      register: addr_show
      loop: "{{ vlans_computed }}"
      loop_control:
        label: "{{ item.iface }}"

    - name: "TEST :: gateway .1 present on each VLAN"
      ansible.builtin.assert:
        that: item.item.gateway in item.stdout
        fail_msg: "{{ item.item.gateway }} missing on {{ item.item.iface }}"
      loop: "{{ addr_show.results }}"
      loop_control:
        label: "{{ item.item.iface }}"

    # ---- routing / NAT ----
    - name: "Read ip_forward"
      ansible.builtin.command: "cat /proc/sys/net/ipv4/ip_forward"
      changed_when: false
      register: ipfwd

    - name: "TEST :: IP forwarding enabled"
      ansible.builtin.assert:
        that: ipfwd.stdout == '1'
        fail_msg: "net.ipv4.ip_forward is not enabled"

    - name: "Dump nft ruleset"
      ansible.builtin.command: "nft list ruleset"
      changed_when: false
      register: nft_rules

    - name: "TEST :: MASQUERADE present on public NIC"
      ansible.builtin.assert:
        that: "'masquerade' in nft_rules.stdout"
        fail_msg: "No masquerade rule found in nftables ruleset"
      when: routing.nat | bool

    - name: "TEST :: egress works through NAT (best-effort)"
      ansible.builtin.uri:
        url: "https://www.google.com"
        method: HEAD
        status_code: [200, 301, 302]
        timeout: 8
      register: egress
      failed_when: false

    - name: "Egress result"
      ansible.builtin.debug:
        msg: "Egress check status={{ egress.status | default('unreachable') }} (warning only)"

    # ---- DNS ----
    - name: "TEST :: forward DNS resolves each record"
      ansible.builtin.command: "dig @{{ native_gw }} +short {{ item.name }}.{{ jumpbox.domain }}"
      changed_when: false
      register: fwd
      failed_when: item.ip not in fwd.stdout
      loop: "{{ dns.records | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "TEST :: reverse DNS resolves each record"
      ansible.builtin.command: "dig @{{ native_gw }} +short -x {{ item.ip }}"
      changed_when: false
      register: rev
      failed_when: (item.name ~ '.' ~ jumpbox.domain) not in rev.stdout
      loop: "{{ dns.records | default([]) }}"
      loop_control:
        label: "{{ item.ip }}"

    # ---- service state ----
    - name: "Gather services"
      ansible.builtin.service_facts:

    - name: "TEST :: core services are running"
      ansible.builtin.assert:
        that: >-
          (ansible_facts.services[item] is defined) and
          (ansible_facts.services[item].state == 'running')
        fail_msg: "Service {{ item }} is not running"
      loop:
        - named.service
        - docker.service

    # ---- DHCP / Kea ----
    - name: "TEST :: Kea config advertises jumbo MTU (option 26)"
      ansible.builtin.command: "grep -q interface-mtu /etc/kea/kea-dhcp4.conf"
      changed_when: false

    - name: "TEST :: Kea config is valid"
      ansible.builtin.command: "kea-dhcp4 -t /etc/kea/kea-dhcp4.conf"
      changed_when: false

    # ---- CA trust ----
    - name: "TEST :: Harbor leaf cert verifies against the lab CA"
      ansible.builtin.command: "openssl verify -CAfile {{ certs.dir }}/ca-bundle.crt {{ certs.dir }}/harbor.crt"
      changed_when: false

    # ---- Harbor ----
    - name: "TEST :: Harbor API healthy"
      ansible.builtin.uri:
        url: "https://{{ registry.fqdn }}/api/v2.0/health"
        validate_certs: true
        status_code: 200

    - name: "TEST :: docker login + pull/push round-trip"
      ansible.builtin.shell: |
        set -e
        echo "{{ vault_registry_admin_password }}" | docker login {{ registry.fqdn }} -u admin --password-stdin
        docker pull hello-world:latest
        docker tag hello-world:latest {{ registry.fqdn }}/library/hello-world:verify
        docker push {{ registry.fqdn }}/library/hello-world:verify
      changed_when: false
      no_log: true
      register: harbor_rt
      failed_when: harbor_rt.rc != 0

    - name: "Verification PASSED"
      ansible.builtin.debug:
        msg: "All Stage 1 verification checks passed on {{ inventory_hostname }}."
