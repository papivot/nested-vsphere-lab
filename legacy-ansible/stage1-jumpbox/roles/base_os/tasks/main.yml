---
# ============================================================================
# base_os :: OS prep for an efficient nested-vSphere router/jumpbox.
#   packages, sysctl tuning, kernel modules, NTP client, proxy env, data dirs.
# ============================================================================

- name: "Load per-OS variables"
  ansible.builtin.include_vars: "{{ role_path }}/vars/{{ os_key }}.yml"

# ---- packages (per package manager) ----
- name: "Install base packages (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.os_family == 'Debian'

- name: "Install base packages (RHEL-like)"
  ansible.builtin.dnf:
    name: "{{ base_packages }}"
    state: present
  when: ansible_facts.os_family == 'RedHat'

- name: "Install base packages (Photon / tdnf)"
  ansible.builtin.command: "tdnf install -y {{ base_packages | join(' ') }}"
  register: tdnf_install
  changed_when: "'Nothing to do' not in tdnf_install.stdout"
  when: os_key == 'Photon'

# ---- data directories on the 100GB disk ----
- name: "Create data directories (Harbor + artifacts)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ registry.data_dir }}"
    - "{{ artifacts.dir }}"
    - "{{ lab.state_dir }}"

# ---- kernel modules (load now + persist) ----
- name: "Load kernel modules now"
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - 8021q
    - br_netfilter
    - nf_conntrack

- name: "Persist kernel modules across reboot"
  ansible.builtin.copy:
    dest: /etc/modules-load.d/nested-lab.conf
    content: "8021q\nbr_netfilter\nnf_conntrack\n"
    mode: "0644"

# ---- sysctl performance/routing tuning ----
- name: "Deploy nested-lab sysctl tuning"
  ansible.builtin.template:
    src: 99-nested-lab.conf.j2
    dest: /etc/sysctl.d/99-nested-lab.conf
    mode: "0644"
  notify: Apply sysctl

# ---- hostname + hosts ----
- name: "Set hostname"
  ansible.builtin.hostname:
    name: "{{ jumpbox.hostname }}"

- name: "Ensure FQDN in /etc/hosts (points at native VLAN gateway)"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^[0-9.]+\\s+{{ jumpbox.hostname }}\\.{{ jumpbox.domain }}"
    line: "{{ (vlans_computed | selectattr('is_native') | map(attribute='gateway') | first) }} {{ jumpbox.hostname }}.{{ jumpbox.domain }} {{ jumpbox.hostname }}"
    state: present

# ---- optional upstream HTTP proxy ----
- name: "Configure system-wide HTTP proxy"
  ansible.builtin.template:
    src: proxy.sh.j2
    dest: /etc/profile.d/nested-lab-proxy.sh
    mode: "0644"
  when: (proxy.http | default('') | length) > 0 or (proxy.https | default('') | length) > 0

- name: "Remove proxy profile when none configured"
  ansible.builtin.file:
    path: /etc/profile.d/nested-lab-proxy.sh
    state: absent
  when: (proxy.http | default('') | length) == 0 and (proxy.https | default('') | length) == 0

# ---- NTP client -> upstream (no local server) ----
- name: "Deploy chrony client config (upstream NTP, reached via NAT by nested nodes)"
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ ntp_conf }}"
    mode: "0644"
  notify: Restart ntp

- name: "Enable + start NTP client"
  ansible.builtin.service:
    name: "{{ ntp_service }}"
    state: started
    enabled: true

- name: "Flush handlers (apply sysctl/ntp now)"
  ansible.builtin.meta: flush_handlers
