---
# ============================================================================
# dns_bind :: BIND9 authoritative for the lab domain + per-VLAN reverse zones,
#             recursive resolver for the private fabric (forwarders from YAML).
#             Pre-creates A/PTR records for nested nodes so Stage 2 resolves.
# ============================================================================

- name: "Scoped rollback hook"
  ansible.builtin.import_tasks: rollback.yml
  tags: [never, rollback-dns_bind]

- name: "Load per-OS BIND vars"
  ansible.builtin.include_vars: "{{ role_path }}/vars/{{ os_key }}.yml"

- name: "Compute stable zone serial (per day)"
  ansible.builtin.set_fact:
    zone_serial: "{{ ansible_date_time.date | replace('-', '') }}01"

- name: "Install BIND (Debian)"
  ansible.builtin.apt:
    name: "{{ bind_packages }}"
    state: present
  when: ansible_facts.os_family == 'Debian'

- name: "Install BIND (RedHat)"
  ansible.builtin.dnf:
    name: "{{ bind_packages }}"
    state: present
  when: ansible_facts.os_family == 'RedHat'

- name: "Install BIND (Photon)"
  ansible.builtin.command: "tdnf install -y {{ bind_packages | join(' ') }}"
  register: bind_tdnf
  changed_when: "'Nothing to do' not in bind_tdnf.stdout"
  when: os_key == 'Photon'

- name: "Ensure zones directory"
  ansible.builtin.file:
    path: "{{ zones_dir }}"
    state: directory
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0750"

# ---- zone data ----
- name: "Render forward zone"
  ansible.builtin.template:
    src: db.forward.j2
    dest: "{{ zones_dir }}/db.forward"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
    validate: "named-checkzone {{ jumpbox.domain }} %s"
  notify: Reload named

- name: "Render reverse zones (one per VLAN /24)"
  ansible.builtin.template:
    src: db.reverse.j2
    dest: "{{ zones_dir }}/db.{{ item.name }}.rev"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  vars:
    v: "{{ item }}"
  loop: "{{ vlans_computed }}"
  loop_control:
    label: "{{ item.name }} reverse"
  notify: Reload named

# ---- named configuration ----
- name: "Render named options (Debian include layout)"
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: "{{ named_options }}"
    owner: root
    group: "{{ bind_group }}"
    mode: "0644"
  when: bind_layout == 'include'
  notify: Reload named

- name: "Render named.conf.local zone declarations (Debian)"
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: "{{ named_local }}"
    owner: root
    group: "{{ bind_group }}"
    mode: "0644"
  when: bind_layout == 'include'
  notify: Reload named

- name: "Render full named.conf (RedHat/Photon single layout)"
  ansible.builtin.template:
    src: named.conf.full.j2
    dest: "{{ named_conf }}"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
    validate: "named-checkconf %s"
  when: bind_layout == 'single'
  notify: Reload named

- name: "Enable + start BIND"
  ansible.builtin.service:
    name: "{{ bind_service }}"
    enabled: true
    state: started

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers
