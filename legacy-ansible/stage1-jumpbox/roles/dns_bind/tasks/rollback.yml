---
- name: "Rollback :: load per-OS BIND vars"
  ansible.builtin.include_vars: "{{ role_path }}/vars/{{ os_key }}.yml"

- name: "Rollback :: stop + disable BIND"
  ansible.builtin.service:
    name: "{{ bind_service }}"
    state: stopped
    enabled: false
  failed_when: false

- name: "Rollback :: remove lab zone files"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: >-
    {{ [zones_dir ~ '/db.forward']
       + (vlans_computed | map(attribute='name')
          | map('regex_replace', '^(.*)$', zones_dir ~ '/db.\1.rev') | list) }}

- name: "Rollback :: remove lab zone declarations (Debian)"
  ansible.builtin.file:
    path: "{{ named_local }}"
    state: absent
  when: bind_layout == 'include'
