---
# ============================================================================
# certs :: root (self-signed) CA or BYO CA, optional intermediate, leaf certs
#          for services, OS trust install, key lock-down + backup.
# Used end-to-end: the CA bundle is distributed to nested nodes by Stage 2.
# ============================================================================

- name: "Scoped rollback hook"
  ansible.builtin.import_tasks: rollback.yml
  tags: [never, rollback-certs]

- name: "Load per-OS trust-store vars"
  ansible.builtin.include_vars: "{{ role_path | dirname }}/base_os/vars/{{ os_key }}.yml"

- name: "Create CA directory (private)"
  ansible.builtin.file:
    path: "{{ certs.dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

# ---------------------------------------------------------------------------
# BYO CA
# ---------------------------------------------------------------------------
- name: "BYO :: install provided CA cert/key"
  when: certs.ca_mode == 'byo'
  block:
    - name: "Copy BYO CA certificate"
      ansible.builtin.copy:
        src: "{{ certs.byo.cert }}"
        dest: "{{ ca_crt }}"
        mode: "0644"
        remote_src: false
    - name: "Copy BYO CA key"
      ansible.builtin.copy:
        src: "{{ certs.byo.key }}"
        dest: "{{ ca_key }}"
        mode: "0600"
        remote_src: false

# ---------------------------------------------------------------------------
# Self-signed root CA
# ---------------------------------------------------------------------------
- name: "Self-signed :: build root CA"
  when: certs.ca_mode == 'selfsigned'
  block:
    - name: "Generate root CA private key"
      community.crypto.openssl_privatekey:
        path: "{{ ca_key }}"
        size: 4096
        type: RSA
        mode: "0600"
        passphrase: "{{ vault_ca_key_passphrase | default('') | ternary(vault_ca_key_passphrase, omit) }}"
        cipher: "{{ 'auto' if (vault_ca_key_passphrase | default('') | length) > 0 else omit }}"

    - name: "Create root CA CSR"
      community.crypto.openssl_csr:
        path: "{{ certs.dir }}/root-ca.csr"
        privatekey_path: "{{ ca_key }}"
        privatekey_passphrase: "{{ vault_ca_key_passphrase | default('') | ternary(vault_ca_key_passphrase, omit) }}"
        common_name: "{{ certs.subject.cn }}"
        organization_name: "{{ certs.subject.org }}"
        country_name: "{{ certs.subject.country | default('US') }}"
        basic_constraints:
          - "CA:TRUE"
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true

    - name: "Self-sign root CA certificate (10 years)"
      community.crypto.x509_certificate:
        path: "{{ ca_crt }}"
        privatekey_path: "{{ ca_key }}"
        privatekey_passphrase: "{{ vault_ca_key_passphrase | default('') | ternary(vault_ca_key_passphrase, omit) }}"
        csr_path: "{{ certs.dir }}/root-ca.csr"
        provider: selfsigned
        selfsigned_not_after: "+3650d"
        mode: "0644"

# ---------------------------------------------------------------------------
# Optional intermediate CA (signed by root)
# ---------------------------------------------------------------------------
- name: "Build intermediate CA"
  when: certs.intermediate | bool
  block:
    - name: "Generate intermediate key"
      community.crypto.openssl_privatekey:
        path: "{{ int_key }}"
        size: 4096
        mode: "0600"

    - name: "Intermediate CSR"
      community.crypto.openssl_csr:
        path: "{{ certs.dir }}/intermediate-ca.csr"
        privatekey_path: "{{ int_key }}"
        common_name: "{{ certs.subject.cn }} Intermediate"
        organization_name: "{{ certs.subject.org }}"
        basic_constraints:
          - "CA:TRUE"
          - "pathlen:0"
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true

    - name: "Sign intermediate with root"
      community.crypto.x509_certificate:
        path: "{{ int_crt }}"
        csr_path: "{{ certs.dir }}/intermediate-ca.csr"
        provider: ownca
        ownca_path: "{{ ca_crt }}"
        ownca_privatekey_path: "{{ ca_key }}"
        ownca_privatekey_passphrase: "{{ vault_ca_key_passphrase | default('') | ternary(vault_ca_key_passphrase, omit) }}"
        ownca_not_after: "+1825d"
        mode: "0644"

# ---------------------------------------------------------------------------
# CA bundle (root [+ intermediate]) for distribution to nested nodes
# ---------------------------------------------------------------------------
- name: "Assemble CA bundle"
  ansible.builtin.assemble:
    src: "{{ certs.dir }}"
    dest: "{{ ca_bundle }}"
    regexp: "^(root-ca|intermediate-ca)\\.crt$"
    mode: "0644"

# ---------------------------------------------------------------------------
# Leaf service certificates (e.g. Harbor)
# ---------------------------------------------------------------------------
- name: "Generate leaf private keys"
  community.crypto.openssl_privatekey:
    path: "{{ certs.dir }}/{{ item.name }}.key"
    size: 2048
    mode: "0640"
  loop: "{{ service_certs }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Generate leaf CSRs"
  community.crypto.openssl_csr:
    path: "{{ certs.dir }}/{{ item.name }}.csr"
    privatekey_path: "{{ certs.dir }}/{{ item.name }}.key"
    common_name: "{{ item.cn }}"
    organization_name: "{{ certs.subject.org }}"
    subject_alt_name: "{{ item.sans }}"
    key_usage:
      - digitalSignature
      - keyEncipherment
    extended_key_usage:
      - serverAuth
  loop: "{{ service_certs }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Sign leaf certs with the CA"
  community.crypto.x509_certificate:
    path: "{{ certs.dir }}/{{ item.name }}.crt"
    csr_path: "{{ certs.dir }}/{{ item.name }}.csr"
    provider: ownca
    ownca_path: "{{ signing_crt }}"
    ownca_privatekey_path: "{{ signing_key }}"
    ownca_privatekey_passphrase: "{{ vault_ca_key_passphrase | default('') | ternary(vault_ca_key_passphrase, omit) }}"
    ownca_not_after: "+825d"
    mode: "0644"
  loop: "{{ service_certs }}"
  loop_control:
    label: "{{ item.name }}"

# ---------------------------------------------------------------------------
# Install CA into the OS trust store
# ---------------------------------------------------------------------------
- name: "Install CA bundle into OS trust anchors"
  ansible.builtin.copy:
    src: "{{ ca_bundle }}"
    dest: "{{ ca_trust_dir }}/nested-lab-ca.crt"
    remote_src: true
    mode: "0644"
  notify: Update CA trust

- name: "Flush handlers (refresh trust store)"
  ansible.builtin.meta: flush_handlers

# ---------------------------------------------------------------------------
# Protect + back up the CA private key
# ---------------------------------------------------------------------------
- name: "Lock down CA private key"
  ansible.builtin.file:
    path: "{{ ca_key }}"
    mode: "0600"
    owner: root
    group: root

- name: "Ensure CA backup directory"
  ansible.builtin.file:
    path: "{{ certs.backup_path }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: "Back up CA key + cert"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ certs.backup_path }}/"
    remote_src: true
    mode: "0600"
  loop:
    - "{{ ca_key }}"
    - "{{ ca_crt }}"

- name: "Record CA fingerprint"
  ansible.builtin.command: "openssl x509 -in {{ ca_crt }} -noout -fingerprint -sha256"
  changed_when: false
  register: ca_fp

- name: "Save CA fingerprint fact"
  ansible.builtin.set_fact:
    ca_fingerprint: "{{ ca_fp.stdout }}"
