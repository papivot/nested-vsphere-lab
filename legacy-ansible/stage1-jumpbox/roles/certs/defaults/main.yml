---
ca_key: "{{ certs.dir }}/root-ca.key"
ca_crt: "{{ certs.dir }}/root-ca.crt"
int_key: "{{ certs.dir }}/intermediate-ca.key"
int_crt: "{{ certs.dir }}/intermediate-ca.crt"
ca_bundle: "{{ certs.dir }}/ca-bundle.crt"     # what gets distributed to nested nodes

# Issuer used to sign leaf service certs (root, or intermediate when enabled).
signing_crt: "{{ int_crt if certs.intermediate else ca_crt }}"
signing_key: "{{ int_key if certs.intermediate else ca_key }}"

# Leaf certs to issue for jumpbox-hosted services.
service_certs:
  - name: harbor
    cn: "{{ registry.fqdn }}"
    sans:
      - "DNS:{{ registry.fqdn }}"
      - "IP:{{ harbor_ip }}"
