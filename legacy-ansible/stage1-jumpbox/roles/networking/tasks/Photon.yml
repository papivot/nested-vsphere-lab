---
- name: "Render physical NIC .network (native VLAN address + VLAN links)"
  ansible.builtin.template:
    src: networkd-physical.network.j2
    dest: "/etc/systemd/network/10-nested-{{ jumpbox.private_nic }}.network"
    mode: "0644"
  notify: Restart networkd

- name: "Render VLAN netdev units"
  ansible.builtin.template:
    src: networkd-vlan.netdev.j2
    dest: "/etc/systemd/network/20-nested-{{ item.iface }}.netdev"
    mode: "0644"
  loop: "{{ vlans_computed | rejectattr('is_native') | list }}"
  loop_control:
    label: "{{ item.iface }}"
  notify: Restart networkd

- name: "Render VLAN .network units"
  ansible.builtin.template:
    src: networkd-vlan.network.j2
    dest: "/etc/systemd/network/21-nested-{{ item.iface }}.network"
    mode: "0644"
  loop: "{{ vlans_computed | rejectattr('is_native') | list }}"
  loop_control:
    label: "{{ item.iface }}"
  notify: Restart networkd

- name: "Enable systemd-networkd"
  ansible.builtin.service:
    name: systemd-networkd
    enabled: true
    state: started
