---
# ============================================================================
# registry_harbor :: Docker engine + Harbor OCI registry with a CA-signed TLS
#   cert (issued by the certs role) and optional proxy-cache projects so the
#   offline nested env can pull upstream images through Harbor.
# ============================================================================

- name: "Scoped rollback hook"
  ansible.builtin.import_tasks: rollback.yml
  tags: [never, rollback-registry_harbor]

- name: "Install Docker engine + compose"
  ansible.builtin.include_tasks: "docker-{{ os_key }}.yml"

- name: "Ensure Docker is running"
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# Local name resolution so 'docker login {{ registry.fqdn }}' works on the jumpbox.
- name: "Add Harbor FQDN to /etc/hosts"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "\\s{{ registry.fqdn }}(\\s|$)"
    line: "{{ harbor_ip }} {{ registry.fqdn }}"
    state: present

# ---- fetch + lay down Harbor ----
- name: "Ensure Harbor data dir"
  ansible.builtin.file:
    path: "{{ registry.data_dir }}"
    state: directory
    mode: "0755"

- name: "Download Harbor online installer"
  ansible.builtin.get_url:
    url: "{{ harbor_installer_url }}"
    dest: "{{ harbor_tgz }}"
    mode: "0644"

- name: "Extract Harbor installer"
  ansible.builtin.unarchive:
    src: "{{ harbor_tgz }}"
    dest: /opt
    remote_src: true
    creates: "{{ harbor_dir }}/install.sh"

- name: "Render harbor.yml"
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: "{{ harbor_dir }}/harbor.yml"
    mode: "0640"
  register: harbor_cfg
  no_log: true

# ---- detect whether Harbor is already running ----
- name: "Check for running Harbor core container"
  ansible.builtin.shell: "docker ps --filter name=harbor-core --format '{{ '{{' }}.Names{{ '}}' }}'"
  changed_when: false
  register: harbor_running

- name: "Run Harbor installer (first install or config changed)"
  ansible.builtin.command:
    cmd: "./install.sh --with-trivy"
    chdir: "{{ harbor_dir }}"
  when: harbor_running.stdout == '' or harbor_cfg.changed
  register: harbor_install
  changed_when: "'----Harbor has been installed' in harbor_install.stdout or harbor_running.stdout == ''"

- name: "Wait for Harbor API to be healthy"
  ansible.builtin.uri:
    url: "{{ harbor_api }}/health"
    validate_certs: true
    status_code: 200
  register: harbor_health
  retries: 30
  delay: 10
  until: harbor_health.status == 200

# ---- optional proxy-cache projects ----
- name: "Configure proxy-cache registries + projects"
  ansible.builtin.include_tasks: proxy_cache.yml
  loop: "{{ registry.proxy_cache | default([]) }}"
  loop_control:
    loop_var: pc
    label: "{{ pc.name }}"
  when: (registry.proxy_cache | default([])) | length > 0
