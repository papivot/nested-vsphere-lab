---
# Scoped rollback: tear down the Harbor stack. Data volume is preserved unless
# the operator removes registry.data_dir manually.
- name: "Rollback :: stop Harbor compose stack"
  ansible.builtin.command:
    cmd: "docker compose -f {{ harbor_dir }}/docker-compose.yml down"
    chdir: "{{ harbor_dir }}"
  failed_when: false
  changed_when: false

- name: "Rollback :: remove Harbor install dir + installer"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ harbor_dir }}"
    - "{{ harbor_tgz }}"

- name: "Rollback :: remove Harbor /etc/hosts entry"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "\\s{{ registry.fqdn }}(\\s|$)"
    state: absent
