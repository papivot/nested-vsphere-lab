---
# Create a proxy-cache registry endpoint + a project bound to it (idempotent).
- name: "List existing registry endpoints"
  ansible.builtin.uri:
    url: "{{ harbor_api }}/registries"
    method: GET
    user: admin
    password: "{{ vault_registry_admin_password }}"
    force_basic_auth: true
    validate_certs: true
    status_code: 200
  register: existing_regs
  no_log: true

- name: "Create registry endpoint '{{ pc.name }}'"
  ansible.builtin.uri:
    url: "{{ harbor_api }}/registries"
    method: POST
    user: admin
    password: "{{ vault_registry_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ pc.name }}"
      type: "{{ pc.type | default('docker-hub') }}"
      url: "{{ pc.url }}"
      insecure: false
    status_code: [201, 409]
    validate_certs: true
  no_log: true
  when: pc.name not in (existing_regs.json | map(attribute='name') | list)

- name: "Re-list registry endpoints (resolve id)"
  ansible.builtin.uri:
    url: "{{ harbor_api }}/registries?name={{ pc.name }}"
    method: GET
    user: admin
    password: "{{ vault_registry_admin_password }}"
    force_basic_auth: true
    validate_certs: true
    status_code: 200
  register: reg_lookup
  no_log: true

- name: "Create proxy-cache project '{{ pc.name }}'"
  ansible.builtin.uri:
    url: "{{ harbor_api }}/projects"
    method: POST
    user: admin
    password: "{{ vault_registry_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      project_name: "{{ pc.name }}"
      public: true
      registry_id: "{{ (reg_lookup.json | first).id }}"
    status_code: [201, 409]
    validate_certs: true
  no_log: true
  when: reg_lookup.json | length > 0
