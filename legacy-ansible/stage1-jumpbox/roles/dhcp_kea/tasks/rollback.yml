---
- name: "Rollback :: load per-OS Kea vars"
  ansible.builtin.include_vars: "{{ role_path }}/vars/{{ os_key }}.yml"

- name: "Rollback :: stop + disable Kea"
  ansible.builtin.service:
    name: "{{ kea_service }}"
    state: stopped
    enabled: false
  failed_when: false

- name: "Rollback :: remove Kea config"
  ansible.builtin.file:
    path: "{{ kea_conf }}"
    state: absent
