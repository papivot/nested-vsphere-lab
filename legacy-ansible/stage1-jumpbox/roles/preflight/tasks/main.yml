---
# ============================================================================
# preflight :: hard validation gate. Runs before ANY mutation so stages do not
# fail half-way. Fails fast with actionable messages.
# ============================================================================

- name: "Compute derived per-VLAN facts"
  ansible.builtin.set_fact:
    vlans_computed: >-
      {{ vlans_computed | default([]) + [ item | combine({
          'gateway':     item.cidr | ansible.utils.ipaddr('1') | ansible.utils.ipaddr('address'),
          'netmask':     item.cidr | ansible.utils.ipaddr('netmask'),
          'prefix':      item.cidr | ansible.utils.ipaddr('prefix'),
          'dhcp_subnet': item.cidr | ansible.utils.ipsubnet(26, 3),
          'dhcp_start':  (item.cidr | ansible.utils.ipsubnet(26, 3)) | ansible.utils.ipaddr('1')  | ansible.utils.ipaddr('address'),
          'dhcp_end':    (item.cidr | ansible.utils.ipsubnet(26, 3)) | ansible.utils.ipaddr('-2') | ansible.utils.ipaddr('address'),
          'is_native':   (item.id == network.native_vlan),
          'iface':       jumpbox.private_nic if (item.id == network.native_vlan) else (jumpbox.private_nic ~ '.' ~ item.id)
        }) ] }}
  loop: "{{ network.vlans }}"
  loop_control:
    label: "vlan {{ item.id }} ({{ item.name }})"
  tags: always

- name: "Resolve Harbor IP (default to native VLAN gateway)"
  ansible.builtin.set_fact:
    harbor_ip: >-
      {{ registry.ip if (registry.ip | default('') | length > 0)
         else (vlans_computed | selectattr('is_native') | map(attribute='gateway') | first) }}
  tags: always

- name: "Determine OS key for per-OS vars (Debian / RedHat / Photon)"
  ansible.builtin.set_fact:
    os_key: "{{ 'Photon' if ('Photon' in ansible_facts.distribution) else ansible_facts.os_family }}"
  tags: always

# ---- OS support ----
- name: "Validate OS family is supported"
  ansible.builtin.assert:
    that: ansible_facts.os_family in supported_os_families
    fail_msg: >-
      Unsupported OS family '{{ ansible_facts.os_family }}'. Supported: {{ supported_os_families | join(', ') }}
      (Ubuntu/Debian, RHEL-like, Photon).
    success_msg: "OS {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }} is supported."

# ---- NICs ----
- name: "Stat private NIC sysfs device link (physical check)"
  ansible.builtin.stat:
    path: "/sys/class/net/{{ jumpbox.private_nic }}/device"
  register: priv_dev

- name: "Stat private NIC presence"
  ansible.builtin.stat:
    path: "/sys/class/net/{{ jumpbox.private_nic }}"
  register: priv_present

- name: "Stat public NIC presence"
  ansible.builtin.stat:
    path: "/sys/class/net/{{ jumpbox.public_nic }}"
  register: pub_present

- name: "Validate private NIC exists and is a physical device"
  ansible.builtin.assert:
    that:
      - priv_present.stat.exists
      - priv_dev.stat.exists
    fail_msg: >-
      Private NIC '{{ jumpbox.private_nic }}' is missing or is not a physical interface
      (no /sys/class/net/{{ jumpbox.private_nic }}/device). It must be a real physical NIC.
    success_msg: "Private NIC '{{ jumpbox.private_nic }}' is present and physical."

- name: "Validate public NIC exists"
  ansible.builtin.assert:
    that: pub_present.stat.exists
    fail_msg: "Public/egress NIC '{{ jumpbox.public_nic }}' not found in /sys/class/net."
    success_msg: "Public NIC '{{ jumpbox.public_nic }}' is present."

- name: "Validate private and public NICs differ"
  ansible.builtin.assert:
    that: jumpbox.private_nic != jumpbox.public_nic
    fail_msg: "private_nic and public_nic must be different interfaces."

# ---- Disk ----
- name: "Find root filesystem mount"
  ansible.builtin.set_fact:
    root_mount: "{{ ansible_facts.mounts | selectattr('mount', 'equalto', '/') | first }}"

- name: "Validate at least {{ min_disk_gb }} GB free on root filesystem"
  ansible.builtin.assert:
    that: (root_mount.size_available | int) >= (min_disk_gb | int * 1024 * 1024 * 1024)
    fail_msg: >-
      Only {{ (root_mount.size_available | int / 1024 / 1024 / 1024) | round(1) }} GB free on '/';
      need >= {{ min_disk_gb }} GB (Harbor images + OVAs/ISOs).
    success_msg: "{{ (root_mount.size_available | int / 1024 / 1024 / 1024) | round(1) }} GB free on '/' (>= {{ min_disk_gb }} GB)."

# ---- Kernel modules / tooling ----
- name: "Check required kernel modules are available"
  ansible.builtin.command: "modinfo {{ item }}"
  changed_when: false
  failed_when: false
  register: modcheck
  loop:
    - 8021q
    - br_netfilter
  loop_control:
    label: "{{ item }}"

- name: "Validate kernel modules present"
  ansible.builtin.assert:
    that: item.rc == 0
    fail_msg: "Kernel module '{{ item.item }}' not available; install the matching kernel-modules package."
  loop: "{{ modcheck.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Check packet-filter tooling (nft or iptables)"
  ansible.builtin.shell: "command -v nft || command -v iptables"
  changed_when: false
  failed_when: false
  register: pf_tool

- name: "Validate a packet filter is installable/available"
  ansible.builtin.debug:
    msg: "nft/iptables not yet installed; base_os will install it ({{ ansible_facts.os_family }})."
  when: pf_tool.rc != 0

# ---- Network model validation ----
- name: "Validate native VLAN is defined"
  ansible.builtin.assert:
    that: network.native_vlan in (network.vlans | map(attribute='id') | list)
    fail_msg: "native_vlan {{ network.native_vlan }} is not among the defined VLANs."

- name: "Validate VLAN IDs are unique"
  ansible.builtin.assert:
    that: (network.vlans | map(attribute='id') | list | unique | length) == (network.vlans | length)
    fail_msg: "Duplicate VLAN IDs detected in network.vlans."

- name: "Validate VLAN subnets are unique"
  ansible.builtin.assert:
    that: >-
      (network.vlans | map(attribute='cidr') | map('ansible.utils.ipaddr','network') | list | unique | length)
      == (network.vlans | length)
    fail_msg: "Overlapping/duplicate VLAN subnets detected."

- name: "Validate every VLAN /24 is contained within the /22 supernet"
  ansible.builtin.assert:
    that:
      - (item.cidr | ansible.utils.ipaddr('prefix') | int) == 24
      - (item.cidr | ansible.utils.ipaddr('network') | ansible.utils.ipaddr('int') | int)
        >= (network.private_supernet | ansible.utils.ipaddr('network')   | ansible.utils.ipaddr('int') | int)
      - (item.cidr | ansible.utils.ipaddr('broadcast') | ansible.utils.ipaddr('int') | int)
        <= (network.private_supernet | ansible.utils.ipaddr('broadcast') | ansible.utils.ipaddr('int') | int)
    fail_msg: "VLAN {{ item.id }} ({{ item.cidr }}) is not a /24 inside {{ network.private_supernet }}."
  loop: "{{ network.vlans }}"
  loop_control:
    label: "vlan {{ item.id }} {{ item.cidr }}"

# ---- Secrets must be set and non-default ----
- name: "Validate Harbor admin password is supplied via vault and non-default"
  ansible.builtin.assert:
    that:
      - vault_registry_admin_password is defined
      - (vault_registry_admin_password | default('')) not in forbidden_passwords
      - (vault_registry_admin_password | default('') | length) >= 8
    fail_msg: >-
      vault_registry_admin_password is missing, too short, or a known default. Provide a strong
      value in an ansible-vault secrets.yml (see secrets.example.yml) and run with --ask-vault-pass.
    success_msg: "Harbor admin password is set and non-default."
  no_log: true

# ---- BYO CA sanity ----
- name: "Validate BYO CA files are provided when ca_mode=byo"
  ansible.builtin.assert:
    that:
      - (certs.byo.cert | default('') | length) > 0
      - (certs.byo.key  | default('') | length) > 0
    fail_msg: "certs.ca_mode=byo but certs.byo.cert / certs.byo.key are not set."
  when: certs.ca_mode == 'byo'

# ---- Best-effort reachability (warn unless strict) ----
- name: "Best-effort: DNS forwarders reachable on tcp/53"
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 53
    timeout: 4
  register: fwd_check
  failed_when: false
  loop: "{{ dns.forwarders }}"
  loop_control:
    label: "{{ item }}"

- name: "Warn on unreachable DNS forwarders"
  ansible.builtin.debug:
    msg: "WARNING: DNS forwarder {{ item.item }} not reachable on tcp/53 (continuing)."
  when: item.elapsed is defined and item.state is not defined
  loop: "{{ fwd_check.results }}"
  loop_control:
    label: "{{ item.item }}"

# ---- Physical vSphere portgroup reminder (cannot enforce from guest) ----
- name: "REMINDER :: physical vSphere portgroup requirements"
  ansible.builtin.debug:
    msg:
      - "ACTION REQUIRED on the PHYSICAL vSphere side (cannot be enforced from inside this VM):"
      - "  - The portgroup backing the private NIC '{{ jumpbox.private_nic }}' must be a VLAN trunk (VLAN ID 4095)."
      - "  - Promiscuous mode = Accept, Forged transmits = Accept, MAC address changes = Accept."
      - "  - MTU on the underlying vSwitch/portgroup must allow {{ mtu.private }} (jumbo)."

- name: "Preflight summary"
  ansible.builtin.debug:
    msg: "Preflight PASSED. {{ network.vlans | length }} VLAN(s), supernet {{ network.private_supernet }}, harbor_ip {{ harbor_ip }}."
