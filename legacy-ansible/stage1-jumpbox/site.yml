---
# Stage 1 - turn a customer Linux VM into the nested-vSphere router/jumpbox.
# Each role is tagged with its own name so run.sh can resume (--from-role) or
# roll back (--rollback <role>). preflight is a hard gate before any mutation.
- name: "Stage 1 :: Jumpbox"
  hosts: jumpbox
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure lab state directory exists
      ansible.builtin.file:
        path: "{{ lab.state_dir }}"
        state: directory
        mode: "0750"
      tags: always

  tasks:
    - name: "Role :: preflight (validation gate)"
      ansible.builtin.import_role:
        name: preflight
      tags: [preflight]

    - name: "Role :: base_os"
      block:
        - ansible.builtin.import_role:
            name: base_os
        - name: "Checkpoint base_os"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "base_os"
            create: true
            mode: "0640"
      tags: [base_os]

    - name: "Role :: certs"
      block:
        - ansible.builtin.import_role:
            name: certs
        - name: "Checkpoint certs"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "certs"
            create: true
            mode: "0640"
      tags: [certs]

    - name: "Role :: networking"
      block:
        - ansible.builtin.import_role:
            name: networking
        - name: "Checkpoint networking"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "networking"
            create: true
            mode: "0640"
      tags: [networking]

    - name: "Role :: routing"
      block:
        - ansible.builtin.import_role:
            name: routing
        - name: "Checkpoint routing"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "routing"
            create: true
            mode: "0640"
      tags: [routing]

    - name: "Role :: dns_bind"
      block:
        - ansible.builtin.import_role:
            name: dns_bind
        - name: "Checkpoint dns_bind"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "dns_bind"
            create: true
            mode: "0640"
      tags: [dns_bind]

    - name: "Role :: dhcp_kea"
      block:
        - ansible.builtin.import_role:
            name: dhcp_kea
        - name: "Checkpoint dhcp_kea"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "dhcp_kea"
            create: true
            mode: "0640"
      tags: [dhcp_kea]

    - name: "Role :: registry_harbor"
      block:
        - ansible.builtin.import_role:
            name: registry_harbor
        - name: "Checkpoint registry_harbor"
          ansible.builtin.lineinfile:
            path: "{{ state_file | default(lab.state_dir + '/stage1.state') }}"
            line: "registry_harbor"
            create: true
            mode: "0640"
      tags: [registry_harbor]

    - name: "Role :: labinfo (final summary sheet)"
      ansible.builtin.import_role:
        name: labinfo
      tags: [labinfo]
